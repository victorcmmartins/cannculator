name: CI/CD — Testes, qualidade e deploy no GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Evita que dois deploys rodem ao mesmo tempo; cancela runs antigas em PRs.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, validação de HTML e testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Lint JavaScript (ESLint)
        run: npm run lint:js

      - name: Validar HTML (html-validate)
        run: npm run lint:html

      - name: Rodar testes unitários (lógica de cálculo + integridade do JSON)
        run: npm test

  deploy:
    name: Publicar no GitHub Pages
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar artefato do site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css _site/css
          cp -r js _site/js
          cp -r data _site/data

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
